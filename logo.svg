<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for the central glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Gradient for neural paths -->
    <linearGradient id="pathGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="pathGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="pathGrad3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <!-- Node glow filter -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow for the central hub -->
    <filter id="hubGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (optional, for icon contexts) -->
  <circle cx="256" cy="256" r="248" fill="#0F0F1A"/>

  <!-- Ambient core glow -->
  <circle cx="256" cy="256" r="160" fill="url(#coreGlow)"/>

  <!-- === Neural connection paths === -->
  <!-- These curved lines represent synaptic pathways / memory traces -->

  <!-- Hub to outer nodes — primary pathways -->
  <!-- Top-left -->
  <path d="M256,256 Q200,200 148,132" stroke="url(#pathGrad1)" stroke-width="2.5" fill="none" opacity="0.8"/>
  <!-- Top -->
  <path d="M256,256 Q248,190 232,108" stroke="url(#pathGrad3)" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Top-right -->
  <path d="M256,256 Q310,195 368,138" stroke="url(#pathGrad2)" stroke-width="2.5" fill="none" opacity="0.8"/>
  <!-- Right -->
  <path d="M256,256 Q320,250 396,228" stroke="url(#pathGrad1)" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Bottom-right -->
  <path d="M256,256 Q320,310 380,370" stroke="url(#pathGrad2)" stroke-width="2.5" fill="none" opacity="0.8"/>
  <!-- Bottom -->
  <path d="M256,256 Q262,330 276,404" stroke="url(#pathGrad3)" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Bottom-left -->
  <path d="M256,256 Q195,315 130,368" stroke="url(#pathGrad1)" stroke-width="2.5" fill="none" opacity="0.8"/>
  <!-- Left -->
  <path d="M256,256 Q190,260 114,280" stroke="url(#pathGrad2)" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Secondary cross-connections (inter-node pathways) -->
  <path d="M148,132 Q188,130 232,108" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M232,108 Q300,110 368,138" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M368,138 Q390,180 396,228" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M396,228 Q395,300 380,370" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M380,370 Q330,395 276,404" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M276,404 Q200,400 130,368" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M130,368 Q115,325 114,280" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M114,280 Q120,200 148,132" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.4"/>

  <!-- Tertiary faint connections (sparse network feel) -->
  <path d="M148,132 Q260,160 396,228" stroke="#6D28D9" stroke-width="0.8" fill="none" opacity="0.2"/>
  <path d="M114,280 Q256,310 380,370" stroke="#6D28D9" stroke-width="0.8" fill="none" opacity="0.2"/>
  <path d="M232,108 Q250,240 276,404" stroke="#6D28D9" stroke-width="0.8" fill="none" opacity="0.2"/>
  <path d="M130,368 Q256,250 368,138" stroke="#6D28D9" stroke-width="0.8" fill="none" opacity="0.2"/>

  <!-- === Outer nodes (memory engram points) === -->
  <circle cx="148" cy="132" r="7" fill="#A78BFA" filter="url(#nodeGlow)"/>
  <circle cx="232" cy="108" r="5.5" fill="#818CF8" filter="url(#nodeGlow)"/>
  <circle cx="368" cy="138" r="7" fill="#A78BFA" filter="url(#nodeGlow)"/>
  <circle cx="396" cy="228" r="5.5" fill="#818CF8" filter="url(#nodeGlow)"/>
  <circle cx="380" cy="370" r="7" fill="#A78BFA" filter="url(#nodeGlow)"/>
  <circle cx="276" cy="404" r="5.5" fill="#818CF8" filter="url(#nodeGlow)"/>
  <circle cx="130" cy="368" r="7" fill="#A78BFA" filter="url(#nodeGlow)"/>
  <circle cx="114" cy="280" r="5.5" fill="#818CF8" filter="url(#nodeGlow)"/>

  <!-- Small satellite nodes (micro-memories) -->
  <circle cx="100" cy="168" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="185" cy="96" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="310" cy="100" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="408" cy="178" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="410" cy="300" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="335" cy="405" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="195" cy="408" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="92" cy="330" r="3" fill="#C4B5FD" opacity="0.5"/>

  <!-- === Central hub — the "recall" core === -->
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="28" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.5"/>
  <!-- Inner filled core -->
  <circle cx="256" cy="256" r="18" fill="#8B5CF6" filter="url(#hubGlow)"/>
  <!-- Bright center dot -->
  <circle cx="256" cy="256" r="6" fill="#E0E7FF"/>

  <!-- === "E" letterform subtly embedded in the hub === -->
  <!-- Three horizontal bars suggesting an abstract "E" -->
  <line x1="248" y1="246" x2="268" y2="246" stroke="#E0E7FF" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="248" y1="256" x2="264" y2="256" stroke="#E0E7FF" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="248" y1="266" x2="268" y2="266" stroke="#E0E7FF" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <!-- Vertical bar of the E -->
  <line x1="248" y1="244" x2="248" y2="268" stroke="#E0E7FF" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
</svg>
